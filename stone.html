<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stone-Paper-Scissors</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <div class="boxes">
        <div class="box" id="rock"><img style="height: 100px; width: 100px; border-radius: 50%;" src="https://github.com/shradha-khapra/JavaScriptSeries/blob/main/StonePaperScissors/images/rock.png?raw=true"></div>
        <div class="box" id="paper"><img style="height: 100px; width: 100px; border-radius: 50%;" src="https://github.com/shradha-khapra/JavaScriptSeries/blob/main/StonePaperScissors/images/paper.png?raw=true"></div>
        <div class="box" id="scissors"><img style="height: 100px; width: 100px; border-radius: 50%;" src="https://github.com/shradha-khapra/JavaScriptSeries/blob/main/StonePaperScissors/images/scissors.png?raw=true"></div>
    </div>
    
    <div class="name">
        <button><b>You</b></button>
        <button><b>Computer</b></button>
    </div>

    <div class="score">
        <p class="user">0</p>
        <p class="computer">0</p>
    </div>

    <div>
        <h1 class = "winner"></h1>
    </div>

    <script src="script.js"></script>
</body>
</html>

<div class="box" id="rock"><img style="height: 100px; width: 100px; border-radius: 50%;" src="https://github.com/shradha-khapra/JavaScriptSeries/blob/main/StonePaperScissors/images/rock.png?raw=true"></div>
